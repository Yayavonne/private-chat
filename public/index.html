<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enigma TEST 777</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: gold;
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 60%;
      margin: 6px;
      padding: 10px;
      border-radius: 12px;
      word-break: break-word;
    }

    .me {
      background: gold;
      margin-left: auto;
    }

    .other {
      background: white;
    }

    img, video {
      max-width: 200px;
      border-radius: 8px;
      cursor: pointer;
    }

    #input {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      background: gold;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    #preview {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.8);
      display:none;
      justify-content:center;
      align-items:center;
    }

    #preview img, #preview video {
      max-width:90%;
      max-height:90%;
    }
  </style>
</head>

<body>

<header>Enigma TEST 777</header>

<div id="chat"></div>

<div id="input">
  <input id="msg" placeholder="Type message..."/>
  <input type="file" id="file"/>
  <button onclick="send()">Send</button>
</div>

<div id="preview" onclick="this.style.display='none'"></div>

<script>
const socket = io();
let username = "User" + Math.floor(Math.random()*1000);

socket.on("init", msgs => {
  msgs.forEach(add);
});

socket.on("new-message", add);

socket.on("recall", id => {
  document.getElementById(id)?.remove();
});

function send(){
  let text = document.getElementById("msg").value;
  if(!text) return;

  socket.emit("send-message", {
    username,
    text,
    type:"text"
  });

  document.getElementById("msg").value="";
}

document.getElementById("file").onchange = async e=>{
  let file = e.target.files[0];
  let form = new FormData();
  form.append("file", file);

  let res = await fetch("/upload",{method:"POST",body:form});
  let data = await res.json();

  socket.emit("send-message",{
    username,
    type:data.type,
    url:data.url
  });
};

function add(m){
  let div = document.createElement("div");
  div.className = "msg " + (m.username===username?"me":"other");
  div.id = m.id;

  if(m.type==="text"){
    div.innerText = m.text;
  }
  else if(m.type==="image"){
    let img = document.createElement("img");
    img.src = m.url;
    img.onclick=()=>preview("image",m.url);
    div.appendChild(img);
  }
  else if(m.type==="video"){
    let v = document.createElement("video");
    v.src = m.url;
    v.onclick=()=>preview("video",m.url);
    div.appendChild(v);
  }

  // 撤回按钮（1分钟内）
  if(m.username===username){
    let btn = document.createElement("button");
    btn.innerText="撤回";
    btn.style.fontSize="10px";

    btn.onclick=()=>{
      if(Date.now()-m.time < 60000){
        socket.emit("recall", m.id);
      }else{
        alert("超过1分钟不能撤回");
      }
    };

    div.appendChild(btn);
  }

  document.getElementById("chat").appendChild(div);
}

function preview(type,src){
  let box = document.getElementById("preview");
  box.innerHTML="";

  if(type==="image"){
    box.innerHTML=`<img src="${src}">`;
  }else{
    box.innerHTML=`<video src="${src}" controls autoplay></video>`;
  }

  box.style.display="flex";
}
</script>

</body>
</html>
