<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enigma</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
      background: #e9e6df;
      height: 100vh;
      overflow: hidden;
    }

    #loginScreen {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      background: #fff;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    }

    .login-box h2 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 28px;
    }

    .login-box input {
      width: 100%;
      margin-bottom: 12px;
      padding: 13px 14px;
      border: 1px solid #ddd;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
    }

    .login-box button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: #f4c542;
      color: #111;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    #error {
      margin-top: 8px;
      text-align: center;
      color: #d33;
      font-size: 14px;
    }

    #chatScreen {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .header {
      height: 60px;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      border-bottom: 1px solid #ddd6ca;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .system,
    .day-separator {
      align-self: center;
      font-size: 12px;
      color: #666;
      background: rgba(0,0,0,0.06);
      padding: 6px 12px;
      border-radius: 999px;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      width: 100%;
      position: relative;
    }

    .msg-row.me {
      justify-content: flex-end;
    }

    .msg-row.other {
      justify-content: flex-start;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #d8d8d8;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #555;
      font-weight: 700;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .msg-wrap {
      max-width: 76%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-row.me .msg-wrap {
      align-items: flex-end;
    }

    .msg-row.other .msg-wrap {
      align-items: flex-start;
    }

    .sender {
      font-size: 12px;
      color: #777;
      padding: 0 4px;
    }

    .bubble {
      position: relative;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.42;
      word-break: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      max-width: 100%;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .bubble.recall-anim {
      transform: scale(0.92);
      opacity: 0.35;
    }

    .msg-row.me .bubble {
      background: #f4c542;
      color: #111;
      border-top-right-radius: 4px;
    }

    .msg-row.other .bubble {
      background: #fff;
      color: #111;
      border-top-left-radius: 4px;
    }

    .msg-row.me .bubble::after {
      content: "";
      position: absolute;
      right: -6px;
      top: 8px;
      width: 0;
      height: 0;
      border-left: 8px solid #f4c542;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }

    .msg-row.other .bubble::before {
      content: "";
      position: absolute;
      left: -6px;
      top: 8px;
      width: 0;
      height: 0;
      border-right: 8px solid #fff;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }

    .bubble.recalled {
      font-style: italic;
      opacity: 0.74;
    }

    .chat-image,
    .chat-video {
      display: block;
      max-width: 260px;
      width: 100%;
      border-radius: 10px;
      background: #000;
      cursor: pointer;
    }

    .audio-box {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 170px;
    }

    .audio-icon {
      font-size: 18px;
    }

    .audio-line {
      flex: 1;
      height: 4px;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
    }

    .file-card {
      min-width: 180px;
      background: rgba(255,255,255,0.55);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .msg-row.other .file-card {
      background: #f6f6f6;
    }

    .file-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .file-link {
      font-size: 13px;
      color: #222;
      text-decoration: underline;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 4px;
      font-size: 11px;
      color: #7a7a7a;
      min-height: 18px;
    }

    .checks {
      letter-spacing: -1px;
      font-weight: 700;
      color: #777;
    }

    .checks.read {
      color: #4aa3ff;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding: 0 4px;
    }

    .recall-btn {
      border: none;
      background: transparent;
      color: #666;
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
    }

    .input-bar {
      background: #f7f7f7;
      border-top: 1px solid #ddd6ca;
      padding: 10px 10px 14px;
      position: relative;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .plus-btn,
    .voice-btn,
    .send-btn {
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .plus-btn,
    .voice-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #ddd;
      font-size: 22px;
      color: #444;
    }

    .voice-btn.recording {
      background: #ffdf78;
      border-color: #e0b400;
    }

    .send-btn {
      min-width: 68px;
      height: 42px;
      padding: 0 18px;
      border-radius: 21px;
      background: #f4c542;
      color: #111;
      font-size: 15px;
      font-weight: 700;
    }

    #msg {
      flex: 1;
      min-width: 0;
      height: 46px;
      border-radius: 23px;
      border: 1px solid #ddd;
      padding: 0 18px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    .plus-menu {
      display: none;
      position: absolute;
      left: 10px;
      bottom: 66px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      padding: 12px;
      gap: 12px;
      z-index: 30;
    }

    .plus-menu.show {
      display: flex;
    }

    .menu-item {
      width: 76px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .menu-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
    }

    .menu-item span {
      font-size: 13px;
      color: #333;
    }

    .icon-photo { background: #90c36b; }
    .icon-video { background: #69aee8; }
    .icon-file { background: #aa8ce6; }
    .icon-avatar { background: #f0b84f; }

    #imageInput,
    #videoInput,
    #fileInput,
    #avatarInput {
      display: none;
    }

    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
    }

    .viewer-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      touch-action: pan-y;
    }

    .viewer img,
    .viewer video {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 12px;
      background: #000;
    }

    .viewer-close,
    .viewer-prev,
    .viewer-next {
      position: absolute;
      border: none;
      background: rgba(255,255,255,0.14);
      color: #fff;
      cursor: pointer;
      z-index: 2;
    }

    .viewer-close {
      top: 18px;
      right: 22px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 28px;
    }

    .viewer-prev,
    .viewer-next {
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 24px;
    }

    .viewer-prev { left: 16px; }
    .viewer-next { right: 16px; }

    .longpress-menu {
      position: fixed;
      display: none;
      background: #222;
      color: #fff;
      border-radius: 12px;
      padding: 8px;
      z-index: 10000;
      min-width: 120px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.24);
    }

    .longpress-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .longpress-item:hover {
      background: rgba(255,255,255,0.1);
    }

    @media (max-width: 640px) {
      .msg-wrap {
        max-width: 80%;
      }

      .menu-item {
        width: 68px;
      }

      .menu-icon {
        width: 46px;
        height: 46px;
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-box">
      <h2>Enigma</h2>
      <input id="username" placeholder="你的名字">
      <input id="code" placeholder="进入码">
      <button onclick="join()">进入</button>
      <div id="error"></div>
    </div>
  </div>

  <div id="chatScreen">
    <div class="header">Enigma</div>
    <div id="messages"></div>

    <div class="input-bar">
      <div class="plus-menu" id="plusMenu">
        <label class="menu-item" for="imageInput">
          <div class="menu-icon icon-photo">🖼</div>
          <span>图片</span>
        </label>
        <label class="menu-item" for="videoInput">
          <div class="menu-icon icon-video">🎥</div>
          <span>视频</span>
        </label>
        <label class="menu-item" for="fileInput">
          <div class="menu-icon icon-file">📁</div>
          <span>文件</span>
        </label>
        <label class="menu-item" for="avatarInput">
          <div class="menu-icon icon-avatar">👤</div>
          <span>头像</span>
        </label>
      </div>

      <div class="input-row">
        <button class="plus-btn" id="plusBtn">＋</button>
        <button class="voice-btn" id="voiceBtn">🎤</button>

        <input type="file" id="imageInput" accept="image/*">
        <input type="file" id="videoInput" accept="video/*">
        <input type="file" id="fileInput">
        <input type="file" id="avatarInput" accept="image/*">

        <input id="msg" placeholder="输入消息">
        <button class="send-btn" onclick="send()">发送</button>
      </div>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <button class="viewer-close" id="viewerClose">×</button>
    <button class="viewer-prev" id="viewerPrev">‹</button>
    <div class="viewer-content" id="viewerContent"></div>
    <button class="viewer-next" id="viewerNext">›</button>
  </div>

  <div class="longpress-menu" id="longpressMenu">
    <div class="longpress-item" id="recallMenuItem">撤回</div>
  </div>

  <script>
    const socket = io();

    let myName = localStorage.getItem('enigma_name') || '';
    let myCode = localStorage.getItem('enigma_code') || '';
    let myAvatar = localStorage.getItem('enigma_avatar') || '';

    let allMessages = [];
    let lastDayLabel = '';

    let pressTimer = null;
    let selectedMessageId = null;

    let mediaItems = [];
    let currentMediaIndex = 0;
    let touchStartX = 0;

    let mediaRecorder = null;
    let recordingChunks = [];
    let isRecording = false;

    const plusBtn = document.getElementById('plusBtn');
    const plusMenu = document.getElementById('plusMenu');
    const voiceBtn = document.getElementById('voiceBtn');
    const longpressMenu = document.getElementById('longpressMenu');

    document.getElementById('username').value = myName;
    document.getElementById('code').value = myCode;

    function formatTime(ts) {
      return new Intl.DateTimeFormat([], {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(new Date(ts));
    }

    function formatDay(ts) {
      const d = new Date(ts);
      const today = new Date();
      const yesterday = new Date();
      yesterday.setDate(today.getDate() - 1);

      const sameDate = (a, b) =>
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();

      if (sameDate(d, today)) return '今天';
      if (sameDate(d, yesterday)) return '昨天';

      return new Intl.DateTimeFormat('zh-CN', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      }).format(d);
    }

    function getCheckMarks(readBy, username) {
      if (readBy && readBy.length > 1) {
        return '<span class="checks read">✔✔</span>';
      }
      return '<span class="checks">✔</span>';
    }

    function createAvatar(name, avatarUrl) {
      const div = document.createElement('div');
      div.className = 'avatar';

      if (avatarUrl) {
        const img = document.createElement('img');
        img.src = avatarUrl;
        div.appendChild(img);
      } else {
        div.innerText = name ? name.charAt(0).toUpperCase() : '?';
      }

      return div;
    }

    function appendDaySeparatorIfNeeded(ts) {
      const label = formatDay(ts);
      if (label === lastDayLabel) return;

      lastDayLabel = label;
      const div = document.createElement('div');
      div.className = 'day-separator';
      div.innerText = label;
      document.getElementById('messages').appendChild(div);
    }

    function canRecall(msg) {
      return msg.username === myName && !msg.recalled && Date.now() - msg.timestamp <= 60000;
    }

    function join() {
      const username = document.getElementById('username').value.trim();
      const code = document.getElementById('code').value.trim();

      if (!username || !code) {
        document.getElementById('error').innerText = '请输入名字和进入码';
        return;
      }

      myName = username;
      myCode = code;

      localStorage.setItem('enigma_name', myName);
      localStorage.setItem('enigma_code', myCode);

      socket.emit('join', {
        username,
        code,
        avatarUrl: myAvatar
      });
    }

    socket.on('access-granted', () => {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatScreen').style.display = 'flex';
      document.getElementById('msg').focus();
    });

    socket.on('access-denied', () => {
      document.getElementById('error').innerText = '进入码错误';
    });

    socket.on('chat history', messages => {
      allMessages = messages;
      rerenderMessages();
      markAllAsRead();
    });

    socket.on('chat message', msg => {
      allMessages.push(msg);
      rerenderMessages();
      if (msg.username !== myName && !msg.recalled) {
        socket.emit('mark-read', { messageId: msg.id, username: myName });
      }
    });

    socket.on('system message', data => {
      const div = document.createElement('div');
      div.className = 'system';
      div.innerText = `${data.text} · ${formatTime(data.timestamp)}`;
      document.getElementById('messages').appendChild(div);
      scrollBottom();
    });

    socket.on('read-update', ({ messageId, readBy }) => {
      const msg = allMessages.find(m => m.id === messageId);
      if (msg) {
        msg.readBy = readBy;
        updateReadStatus(messageId, readBy);
      }
    });

    socket.on('message-recalled', ({ message }) => {
      const row = document.querySelector(`[data-id="${message.id}"] .bubble`);
      if (row) {
        row.classList.add('recall-anim');
        setTimeout(() => {
          allMessages = allMessages.map(m => m.id === message.id ? { ...m, ...message } : m);
          rerenderMessages();
        }, 220);
      } else {
        allMessages = allMessages.map(m => m.id === message.id ? { ...m, ...message } : m);
        rerenderMessages();
      }
    });

    socket.on('recall-failed', ({ reason }) => {
      alert(reason);
    });

    function updateReadStatus(messageId, readBy) {
      const el = document.getElementById(`check-${messageId}`);
      if (el) {
        el.innerHTML = getCheckMarks(readBy, myName);
      }
    }

    function rerenderMessages() {
      const box = document.getElementById('messages');
      box.innerHTML = '';
      lastDayLabel = '';

      allMessages.forEach(msg => renderMessage(msg));
      scrollBottom();
      rebuildMediaList();
    }

    function rebuildMediaList() {
      mediaItems = allMessages.filter(m => !m.recalled && (m.type === 'image' || m.type === 'video'));
    }

    function renderMessage(msg) {
      appendDaySeparatorIfNeeded(msg.timestamp);

      const row = document.createElement('div');
      row.className = `msg-row ${msg.username === myName ? 'me' : 'other'}`;
      row.dataset.id = msg.id;

      const avatar = createAvatar(
        msg.username,
        msg.username === myName ? myAvatar : (msg.avatarUrl || '')
      );

      const wrap = document.createElement('div');
      wrap.className = 'msg-wrap';

      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.innerText = msg.username;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (msg.recalled) {
        bubble.classList.add('recalled');
        bubble.innerText = '这条消息已被撤回';
      } else if (msg.type === 'image') {
        const img = document.createElement('img');
        img.src = msg.imageUrl;
        img.className = 'chat-image';
        img.addEventListener('click', () => openViewerById(msg.id));
        bubble.appendChild(img);
      } else if (msg.type === 'video') {
        const video = document.createElement('video');
        video.src = msg.videoUrl;
        video.className = 'chat-video';
        video.muted = true;
        video.playsInline = true;
        video.addEventListener('click', () => openViewerById(msg.id));
        bubble.appendChild(video);
      } else if (msg.type === 'audio') {
        const box = document.createElement('div');
        box.className = 'audio-box';

        const icon = document.createElement('div');
        icon.className = 'audio-icon';
        icon.innerText = '🔊';

        const line = document.createElement('div');
        line.className = 'audio-line';

        const audio = document.createElement('audio');
        audio.src = msg.audioUrl;
        audio.controls = true;
        audio.style.width = '100%';
        audio.style.marginTop = '8px';

        box.appendChild(icon);
        box.appendChild(line);
        bubble.appendChild(box);
        bubble.appendChild(audio);
      } else if (msg.type === 'file') {
        const fileCard = document.createElement('div');
        fileCard.className = 'file-card';

        const fileName = document.createElement('div');
        fileName.className = 'file-name';
        fileName.innerText = msg.fileName || '文件';

        const link = document.createElement('a');
        link.className = 'file-link';
        link.href = msg.fileUrl;
        link.target = '_blank';
        link.innerText = '打开 / 下载';

        fileCard.appendChild(fileName);
        fileCard.appendChild(link);
        bubble.appendChild(fileCard);
      } else {
        bubble.innerText = msg.text;
      }

      attachLongPress(row, msg);

      const meta = document.createElement('div');
      meta.className = 'meta';

      const time = document.createElement('span');
      time.innerText = formatTime(msg.timestamp);
      meta.appendChild(time);

      if (msg.username === myName) {
        const check = document.createElement('span');
        check.id = `check-${msg.id}`;
        check.innerHTML = getCheckMarks(msg.readBy || [], myName);
        meta.appendChild(check);
      }

      wrap.appendChild(sender);
      wrap.appendChild(bubble);
      wrap.appendChild(meta);

      if (msg.username === myName && canRecall(msg)) {
        const actions = document.createElement('div');
        actions.className = 'actions';

        const btn = document.createElement('button');
        btn.className = 'recall-btn';
        btn.innerText = '撤回';
        btn.onclick = () => socket.emit('recall-message', { messageId: msg.id });

        actions.appendChild(btn);
        wrap.appendChild(actions);
      }

      if (msg.username === myName) {
        row.appendChild(wrap);
        row.appendChild(avatar);
      } else {
        row.appendChild(avatar);
        row.appendChild(wrap);
      }

      document.getElementById('messages').appendChild(row);

      if (msg.username !== myName && !msg.recalled) {
        socket.emit('mark-read', { messageId: msg.id, username: myName });
      }
    }

    function scrollBottom() {
      const box = document.getElementById('messages');
      box.scrollTop = box.scrollHeight;
    }

    function markAllAsRead() {
      allMessages.forEach(msg => {
        if (msg.username !== myName && !msg.recalled) {
          socket.emit('mark-read', { messageId: msg.id, username: myName });
        }
      });
    }

    function send() {
      const input = document.getElementById('msg');
      const text = input.value.trim();
      if (!text) return;

      socket.emit('chat message', {
        text,
        avatarUrl: myAvatar
      });

      input.value = '';
    }

    document.getElementById('msg').addEventListener('keydown', e => {
      if (e.key === 'Enter') send();
    });

    plusBtn.addEventListener('click', () => {
      plusMenu.classList.toggle('show');
    });

    document.addEventListener('click', e => {
      if (!plusMenu.contains(e.target) && e.target !== plusBtn) {
        plusMenu.classList.remove('show');
      }
      if (!longpressMenu.contains(e.target)) {
        longpressMenu.style.display = 'none';
      }
    });

    async function uploadSelectedFile(file) {
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);
      formData.append('username', myName);
      formData.append('code', myCode);
      formData.append('avatarUrl', myAvatar);

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();
        if (!res.ok) alert(data.error || '上传失败');
      } catch {
        alert('上传失败');
      }

      plusMenu.classList.remove('show');
    }

    document.getElementById('imageInput').addEventListener('change', async e => {
      await uploadSelectedFile(e.target.files[0]);
      e.target.value = '';
    });

    document.getElementById('videoInput').addEventListener('change', async e => {
      await uploadSelectedFile(e.target.files[0]);
      e.target.value = '';
    });

    document.getElementById('fileInput').addEventListener('change', async e => {
      await uploadSelectedFile(e.target.files[0]);
      e.target.value = '';
    });

    document.getElementById('avatarInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = evt => {
        myAvatar = evt.target.result;
        localStorage.setItem('enigma_avatar', myAvatar);
        alert('头像已更新');
      };
      reader.readAsDataURL(file);

      plusMenu.classList.remove('show');
      e.target.value = '';
    });

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        recordingChunks = [];

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) recordingChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          const blob = new Blob(recordingChunks, { type: 'audio/webm' });
          const file = new File([blob], `voice-${Date.now()}.webm`, { type: 'audio/webm' });
          await uploadSelectedFile(file);
          stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();
        isRecording = true;
        voiceBtn.classList.add('recording');
      } catch {
        alert('无法使用麦克风');
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        voiceBtn.classList.remove('recording');
      }
    }

    voiceBtn.addEventListener('mousedown', startRecording);
    voiceBtn.addEventListener('mouseup', stopRecording);
    voiceBtn.addEventListener('mouseleave', stopRecording);
    voiceBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      startRecording();
    }, { passive: false });
    voiceBtn.addEventListener('touchend', e => {
      e.preventDefault();
      stopRecording();
    });

    function attachLongPress(element, msg) {
      const start = e => {
        if (msg.username !== myName || !canRecall(msg)) return;
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
          selectedMessageId = msg.id;
          showLongpressMenu(e);
        }, 450);
      };

      const cancel = () => clearTimeout(pressTimer);

      element.addEventListener('mousedown', start);
      element.addEventListener('touchstart', start);
      element.addEventListener('mouseup', cancel);
      element.addEventListener('mouseleave', cancel);
      element.addEventListener('touchend', cancel);
      element.addEventListener('touchmove', cancel);
    }

    function showLongpressMenu(e) {
      let x = 0;
      let y = 0;

      if (e.touches && e.touches[0]) {
        x = e.touches[0].clientX;
        y = e.touches[0].clientY;
      } else {
        x = e.clientX;
        y = e.clientY;
      }

      longpressMenu.style.left = `${x}px`;
      longpressMenu.style.top = `${y}px`;
      longpressMenu.style.display = 'block';
    }

    document.getElementById('recallMenuItem').addEventListener('click', () => {
      if (selectedMessageId) {
        socket.emit('recall-message', { messageId: selectedMessageId });
      }
      longpressMenu.style.display = 'none';
    });

    function openViewerById(messageId) {
      const index = mediaItems.findIndex(m => m.id === messageId);
      if (index === -1) return;
      currentMediaIndex = index;
      renderViewer();
      document.getElementById('viewer').style.display = 'flex';
    }

    function renderViewer() {
      const item = mediaItems[currentMediaIndex];
      const content = document.getElementById('viewerContent');
      content.innerHTML = '';

      if (!item) return;

      if (item.type === 'image') {
        const img = document.createElement('img');
        img.src = item.imageUrl;
        content.appendChild(img);
      } else if (item.type === 'video') {
        const video = document.createElement('video');
        video.src = item.videoUrl;
        video.controls = true;
        video.autoplay = true;
        content.appendChild(video);
      }
    }

    function closeViewer() {
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('viewerContent').innerHTML = '';
    }

    function prevViewer() {
      if (!mediaItems.length) return;
      currentMediaIndex = (currentMediaIndex - 1 + mediaItems.length) % mediaItems.length;
      renderViewer();
    }

    function nextViewer() {
      if (!mediaItems.length) return;
      currentMediaIndex = (currentMediaIndex + 1) % mediaItems.length;
      renderViewer();
    }

    document.getElementById('viewerClose').onclick = closeViewer;
    document.getElementById('viewerPrev').onclick = prevViewer;
    document.getElementById('viewerNext').onclick = nextViewer;

    const viewerContent = document.getElementById('viewerContent');
    viewerContent.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].clientX;
    });

    viewerContent.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) < 40) return;
      if (diff > 0) prevViewer();
      else nextViewer();
    });

    document.getElementById('viewer').addEventListener('click', e => {
      if (e.target.id === 'viewer') closeViewer();
    });
  </script>
</body>
</html>
